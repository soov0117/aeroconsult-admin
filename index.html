<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에어로컨설트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .hero {
            text-align: center;
            padding: 40px 20px;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 16px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 1.2rem;
            color: #a8d8f0;
            margin-bottom: 48px;
        }

        .plane-img {
            width: 90%;
            max-width: 800px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .cafe-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 16px 40px;
            background: #03C75A;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 8px 24px rgba(3, 199, 90, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cafe-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(3, 199, 90, 0.6);
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>안녕하세요! 에어로컨설트입니다 ✈️</h1>
        <p>하늘을 향한 새로운 여정을 함께합니다.</p>
        <img
            class="plane-img"
            src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1200&auto=format&fit=crop"
            alt="비행기가 하늘을 나는 사진"
        />
        <a class="cafe-btn" href="https://cafe.naver.com/aeroconsult" target="_blank">☕ 네이버 카페 가기</a>
    </div>
</body>
</html>
